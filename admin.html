<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MONSTERS - لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  * { font-family:'Cairo',sans-serif; }
  .tab-active { background:#000; color:#fff; }
</style>
</head>
<body class="bg-gray-100 text-black" x-data="adminPanel()" x-init="init()">

<!-- Login Screen -->
<div x-show="!loggedIn" class="min-h-screen flex items-center justify-center px-4">
  <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-sm text-center">
    <div class="bg-black rounded-2xl px-4 py-2 inline-flex items-center gap-1 mb-6">
      <span class="text-green-400 font-black text-2xl">M</span>
      <span class="text-white font-black text-xl">ONSTERS</span>
    </div>
    <h1 class="text-2xl font-black mb-6">لوحة الإدارة</h1>
    <input x-model="password" type="password" placeholder="كلمة المرور" @keyup.enter="login()"
      class="w-full border border-gray-200 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-green-400 text-center text-lg"/>
    <p x-show="loginError" class="text-red-500 text-sm mb-3 font-bold">❌ كلمة المرور غلط</p>
    <button @click="login()" class="w-full bg-black text-white font-black py-3 rounded-xl hover:bg-green-500 hover:text-black transition text-lg">دخول</button>
    <p class="text-xs text-gray-400 mt-4">الباسورد الافتراضي: admin123</p>
  </div>
</div>

<!-- Admin Panel -->
<div x-show="loggedIn" class="min-h-screen">
  <div class="bg-black text-white px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-green-400 font-black text-xl">M</span>
      <span class="font-black text-lg">ONSTERS Admin</span>
    </div>
    <div class="flex items-center gap-4">
      <a href="index.html" target="_blank" class="text-gray-300 hover:text-green-400 text-sm"><i class="fas fa-external-link-alt ml-1"></i>المتجر</a>
      <button @click="loggedIn=false" class="text-gray-300 hover:text-red-400 text-sm"><i class="fas fa-sign-out-alt ml-1"></i>خروج</button>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-2 md:grid-cols-4 gap-4">
    <div class="bg-white rounded-2xl p-5 text-center shadow-sm">
      <div class="text-4xl font-black text-green-600" x-text="products.length"></div>
      <div class="text-gray-500 text-sm mt-1 font-bold">منتج</div>
    </div>
    <div class="bg-white rounded-2xl p-5 text-center shadow-sm">
      <div class="text-4xl font-black text-blue-500" x-text="categories.length"></div>
      <div class="text-gray-500 text-sm mt-1 font-bold">قسم</div>
    </div>
    <div class="bg-white rounded-2xl p-5 text-center shadow-sm">
      <div class="text-4xl font-black text-purple-500" x-text="products.filter(p=>p.discount_value>0).length"></div>
      <div class="text-gray-500 text-sm mt-1 font-bold">منتج بخصم</div>
    </div>
    <div class="bg-white rounded-2xl p-5 text-center shadow-sm">
      <div class="text-4xl font-black text-orange-500">27</div>
      <div class="text-gray-500 text-sm mt-1 font-bold">محافظة</div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4">
    <div class="flex gap-2 mb-6 bg-white rounded-2xl p-2 shadow-sm w-fit">
      <button @click="tab='products'" :class="tab==='products'?'tab-active':''" class="px-6 py-2 rounded-xl font-bold text-sm transition">
        <i class="fas fa-box ml-1"></i>المنتجات
      </button>
      <button @click="tab='categories'" :class="tab==='categories'?'tab-active':''" class="px-6 py-2 rounded-xl font-bold text-sm transition">
        <i class="fas fa-tags ml-1"></i>الأقسام
      </button>
    </div>

    <!-- PRODUCTS TAB -->
    <div x-show="tab==='products'">
      <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
        <h2 class="font-black text-xl mb-5" x-text="editId ? 'تعديل المنتج' : 'إضافة منتج جديد'"></h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="text-sm font-bold mb-1 block">اسم المنتج *</label>
            <input x-model="pForm.name" type="text" placeholder="كوتش كلاسيك أسود"
              class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-green-400"/>
          </div>
          <div>
            <label class="text-sm font-bold mb-1 block">النوع / القسم *</label>
            <select x-model="pForm.type" class="w-full border rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:border-green-400">
              <option value="">اختر القسم</option>
              <template x-for="c in categories"><option :value="c.slug" x-text="c.name"></option></template>
            </select>
          </div>
          <div>
            <label class="text-sm font-bold mb-1 block">السعر (EGP) *</label>
            <input x-model.number="pForm.price" type="number" placeholder="799"
              class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-green-400" dir="ltr"/>
          </div>
          <div>
            <label class="text-sm font-bold mb-1 block">رابط الصورة</label>
            <input x-model="pForm.image_url" type="url" placeholder="https://..."
              class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-green-400" dir="ltr"/>
          </div>
          <div>
            <label class="text-sm font-bold mb-1 block">نوع الخصم</label>
            <select x-model="pForm.discount_type" class="w-full border rounded-xl px-3 py-2 text-sm bg-white focus:outline-none focus:border-green-400">
              <option value="">بدون خصم</option>
              <option value="percent">نسبة مئوية %</option>
              <option value="fixed">مبلغ ثابت EGP</option>
            </select>
          </div>
          <div>
            <label class="text-sm font-bold mb-1 block">قيمة الخصم</label>
            <input x-model.number="pForm.discount_value" type="number" placeholder="15"
              :disabled="!pForm.discount_type"
              class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-green-400 disabled:bg-gray-50 disabled:text-gray-300" dir="ltr"/>
          </div>
        </div>

        <div class="mt-4">
          <label class="text-sm font-bold mb-1 block">أو ارفع صورة</label>
          <div class="flex items-center gap-3">
            <input type="file" accept="image/*" @change="uploadImage($event)"
              class="flex-1 text-sm border rounded-xl px-3 py-2 file:bg-black file:text-white file:rounded-lg file:border-0 file:px-3 file:py-1 file:font-bold file:cursor-pointer"/>
            <span x-show="uploading" class="text-green-500 text-sm font-bold"><i class="fas fa-spinner fa-spin ml-1"></i>جارٍ الرفع...</span>
          </div>
          <div x-show="pForm.image_url" class="mt-2">
            <img :src="pForm.image_url" class="h-20 w-20 object-cover rounded-xl border"/>
          </div>
        </div>

        <p x-show="formError" class="text-red-500 text-sm mt-3 font-bold" x-text="formError"></p>

        <div class="flex gap-3 mt-5">
          <button @click="saveProduct()" :disabled="saving"
            class="bg-black text-white font-black px-8 py-3 rounded-xl hover:bg-green-500 hover:text-black transition disabled:opacity-50">
            <span x-show="!saving" x-text="editId?'حفظ التعديلات':'إضافة المنتج'"></span>
            <span x-show="saving"><i class="fas fa-spinner fa-spin ml-1"></i>جارٍ الحفظ...</span>
          </button>
          <button x-show="editId" @click="cancelEdit()" class="bg-gray-100 text-black font-bold px-6 py-3 rounded-xl hover:bg-gray-200 transition">إلغاء</button>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-4 border-b flex items-center justify-between">
          <h3 class="font-black text-lg">المنتجات (<span x-text="products.length"></span>)</h3>
          <input x-model="search" type="text" placeholder="ابحث..." class="border rounded-xl px-3 py-2 text-sm w-48 focus:outline-none focus:border-green-400"/>
        </div>
        <div x-show="loadingProds" class="p-8 text-center text-gray-400">
          <i class="fas fa-spinner fa-spin text-3xl text-green-500 mb-3 block"></i>جارٍ التحميل...
        </div>
        <div class="overflow-x-auto" x-show="!loadingProds">
          <table class="w-full text-sm">
            <thead class="bg-gray-50 text-gray-500 text-xs font-bold">
              <tr>
                <th class="p-3 text-right">الصورة</th>
                <th class="p-3 text-right">الاسم</th>
                <th class="p-3 text-right">النوع</th>
                <th class="p-3 text-right">السعر</th>
                <th class="p-3 text-right">الخصم</th>
                <th class="p-3 text-center">إجراءات</th>
              </tr>
            </thead>
            <tbody>
              <template x-for="p in filteredProducts" :key="p.id">
                <tr class="border-t hover:bg-gray-50 transition">
                  <td class="p-3"><img :src="p.image_url||'https://placehold.co/50x50/111/22c55e?text=M'" class="w-12 h-12 object-cover rounded-xl"/></td>
                  <td class="p-3 font-bold max-w-xs truncate" x-text="p.name"></td>
                  <td class="p-3"><span class="bg-gray-100 px-2 py-1 rounded-full text-xs font-bold" x-text="p.type"></span></td>
                  <td class="p-3 font-bold text-green-600" x-text="'EGP '+p.price"></td>
                  <td class="p-3">
                    <span x-show="p.discount_value" class="bg-green-100 text-green-700 px-2 py-1 rounded-full text-xs font-bold"
                      x-text="p.discount_type==='percent' ? p.discount_value+'%' : 'EGP '+p.discount_value"></span>
                    <span x-show="!p.discount_value" class="text-gray-300 text-xs">-</span>
                  </td>
                  <td class="p-3 text-center">
                    <div class="flex gap-2 justify-center">
                      <button @click="editProduct(p)" class="bg-blue-50 text-blue-600 hover:bg-blue-100 px-3 py-1 rounded-lg text-xs font-bold transition"><i class="fas fa-edit"></i></button>
                      <button @click="deleteProduct(p.id)" class="bg-red-50 text-red-500 hover:bg-red-100 px-3 py-1 rounded-lg text-xs font-bold transition"><i class="fas fa-trash"></i></button>
                    </div>
                  </td>
                </tr>
              </template>
              <tr x-show="filteredProducts.length===0">
                <td colspan="6" class="p-8 text-center text-gray-400">لا توجد منتجات</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- CATEGORIES TAB -->
    <div x-show="tab==='categories'">
      <div class="bg-white rounded-2xl p-6 shadow-sm mb-6">
        <h2 class="font-black text-xl mb-5">إضافة قسم جديد</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
          <div>
            <label class="text-sm font-bold mb-1 block">اسم القسم *</label>
            <input x-model="catForm.name" type="text" placeholder="كوتشيات"
              class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-green-400"/>
          </div>
          <div>
            <label class="text-sm font-bold mb-1 block">Slug (إنجليزي) *</label>
            <input x-model="catForm.slug" type="text" placeholder="sneakers"
              class="w-full border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-green-400" dir="ltr"/>
          </div>
          <button @click="saveCategory()" class="bg-black text-white font-black px-6 py-2 rounded-xl hover:bg-green-500 hover:text-black transition h-10">إضافة القسم</button>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="p-4 border-b"><h3 class="font-black text-lg">الأقسام (<span x-text="categories.length"></span>)</h3></div>
        <div class="divide-y">
          <template x-for="cat in categories" :key="cat.id">
            <div class="p-4 flex items-center justify-between hover:bg-gray-50 transition">
              <div class="flex items-center gap-3">
                <span class="text-3xl" x-text="getCatEmoji(cat.slug)"></span>
                <div>
                  <p class="font-bold" x-text="cat.name"></p>
                  <p class="text-gray-400 text-xs" x-text="cat.slug" dir="ltr"></p>
                </div>
              </div>
              <button @click="deleteCategory(cat.id)" class="text-red-400 hover:text-red-600 transition px-3 py-1 hover:bg-red-50 rounded-lg">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          </template>
          <div x-show="categories.length===0" class="p-8 text-center text-gray-400">لا توجد أقسام</div>
        </div>
      </div>
    </div>
  </div>

  <div class="py-8 text-center text-gray-400 text-sm">MONSTERS Admin Panel © 2025</div>
</div>

<!-- Toast -->
<div x-show="toast.show" x-transition
  class="fixed bottom-6 left-1/2 transform -translate-x-1/2 font-black px-6 py-3 rounded-full shadow-xl z-50 text-sm"
  :class="toast.ok ? 'bg-green-500 text-black' : 'bg-red-500 text-white'"
  x-text="toast.msg"></div>

<script>
const API = '';

function adminPanel() {
  return {
    loggedIn: false,
    password: '',
    loginError: false,
    tab: 'products',
    products: [],
    categories: [],
    loadingProds: true,
    search: '',
    editId: null,
    saving: false,
    uploading: false,
    formError: '',
    pForm: { name:'', type:'', price:0, image_url:'', discount_type:'', discount_value:0 },
    catForm: { name:'', slug:'' },
    toast: { show:false, msg:'', ok:true },

    login() {
      if (this.password === 'admin123') { this.loggedIn=true; this.loginError=false; this.init(); }
      else this.loginError = true;
    },

    async init() {
      await Promise.all([this.fetchProducts(), this.fetchCategories()]);
    },

    async fetchProducts() {
      this.loadingProds = true;
      try {
        const r = await fetch(`${API}/api/products`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        this.products = Array.isArray(d) ? d : (d.products || []);
      } catch { this.showToast('❌ خطأ في جلب المنتجات', false); }
      this.loadingProds = false;
    },

    async fetchCategories() {
      try {
        const r = await fetch(`${API}/api/categories`);
        if (!r.ok) throw new Error();
        const d = await r.json();
        this.categories = Array.isArray(d) ? d : (d.categories || []);
      } catch {}
    },

    get filteredProducts() {
      if (!this.search) return this.products;
      return this.products.filter(p=>p.name.includes(this.search)||p.type.includes(this.search));
    },

    async uploadImage(e) {
      const file = e.target.files[0];
      if (!file) return;
      this.uploading = true;
      try {
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const r = await fetch(`${API}/api/upload`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: ev.target.result, fileName: file.name })
          });
          const data = await r.json();
          if (data.url) { this.pForm.image_url = data.url; this.showToast('✅ تم رفع الصورة!'); }
          else throw new Error();
          this.uploading = false;
        };
        reader.readAsDataURL(file);
      } catch { this.showToast('❌ فشل رفع الصورة', false); this.uploading = false; }
    },

    async saveProduct() {
      if (!this.pForm.name || !this.pForm.price) { this.formError='الاسم والسعر مطلوبين'; return; }
      this.formError=''; this.saving=true;
      try {
        const method = this.editId ? 'PUT' : 'POST';
        const url = this.editId ? `${API}/api/products/${this.editId}` : `${API}/api/products`;
        const r = await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(this.pForm) });
        if (!r.ok) throw new Error();
        await this.fetchProducts();
        const msg = this.editId ? '✅ تم التعديل!' : '✅ تمت الإضافة!';
        this.cancelEdit();
        this.showToast(msg);
      } catch { this.showToast('❌ حدث خطأ', false); }
      this.saving = false;
    },

    editProduct(p) {
      this.editId = p.id;
      this.pForm = { name:p.name, type:p.type, price:p.price, image_url:p.image_url||'', discount_type:p.discount_type||'', discount_value:p.discount_value||0 };
      window.scrollTo({top:200, behavior:'smooth'});
    },

    cancelEdit() {
      this.editId=null;
      this.pForm = { name:'', type:'', price:0, image_url:'', discount_type:'', discount_value:0 };
    },

    async deleteProduct(id) {
      if (!confirm('متأكد من الحذف؟')) return;
      try {
        const r = await fetch(`${API}/api/products/${id}`, { method:'DELETE' });
        if (!r.ok) throw new Error();
        this.products = this.products.filter(p=>p.id!==id);
        this.showToast('🗑️ تم الحذف');
      } catch { this.showToast('❌ فشل الحذف', false); }
    },

    async saveCategory() {
      if (!this.catForm.name || !this.catForm.slug) { this.showToast('❌ الاسم والـ Slug مطلوبين', false); return; }
      try {
        const r = await fetch(`${API}/api/categories`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(this.catForm) });
        if (!r.ok) throw new Error();
        await this.fetchCategories();
        this.catForm = { name:'', slug:'' };
        this.showToast('✅ تم إضافة القسم!');
      } catch { this.showToast('❌ فشل إضافة القسم', false); }
    },

    async deleteCategory(id) {
      if (!confirm('متأكد من حذف القسم؟')) return;
      try {
        const r = await fetch(`${API}/api/categories/${id}`, { method:'DELETE' });
        if (!r.ok) throw new Error();
        this.categories = this.categories.filter(c=>c.id!==id);
        this.showToast('🗑️ تم حذف القسم');
      } catch { this.showToast('❌ فشل الحذف', false); }
    },

    getCatEmoji(slug) {
      return {sneakers:'👟',slippers:'🥿',sports:'⚽',sandals:'👡'}[slug]||'👠';
    },

    showToast(msg, ok=true) {
      this.toast = { show:true, msg, ok };
      setTimeout(()=>this.toast.show=false, 3000);
    }
  }
}
</script>
</body>
</html>
